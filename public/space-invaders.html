<!DOCTYPE html>
<html lang="en-CA">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Space Invaders</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000; color: #0f0;
    font-family: "Courier New", monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #hud {
    width: 100%; max-width: 900px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; font-size: 18px; letter-spacing: 2px;
    text-shadow: 0 0 6px #0f0;
  }
  #hud span b { color: #fff; font-weight: normal; }
  #stage {
    position: relative;
    width: 100%; max-width: 900px; flex: 1;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: #000;
    display: block;
    border: 2px solid #0f0;
    box-shadow: 0 0 18px #0f0 inset, 0 0 12px #0f0;
    image-rendering: pixelated;
    touch-action: none;
    max-width: 100%;
    max-height: 100%;
  }
  #controls {
    width: 100%; max-width: 900px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px 16px;
    gap: 10px;
  }
  .pad {
    flex: 1;
    display: flex; gap: 10px;
  }
  button.key {
    flex: 1;
    min-height: 64px;
    font-family: inherit; font-size: 22px; letter-spacing: 2px;
    background: #001a00; color: #0f0;
    border: 2px solid #0f0; border-radius: 10px;
    box-shadow: 0 0 8px #0f0 inset;
    padding: 10px 16px;
    cursor: pointer;
    touch-action: none;
  }
  button.key:active, button.key.down {
    background: #0f0; color: #000;
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    background: rgba(0,0,0,0.8);
    text-align: center; padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { margin: 0; font-size: 34px; letter-spacing: 4px; text-shadow: 0 0 10px #0f0; }
  #overlay p { margin: 0; max-width: 520px; line-height: 1.5; }
  #overlay button {
    font-family: inherit; font-size: 20px; letter-spacing: 3px;
    background: #001a00; color: #0f0;
    border: 2px solid #0f0; border-radius: 10px;
    padding: 12px 28px; cursor: pointer;
    box-shadow: 0 0 8px #0f0 inset;
  }
  #overlay button:active { background: #0f0; color: #000; }
  @media (max-width: 520px) {
    #hud { font-size: 14px; padding: 6px 10px; }
    #overlay h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCORE <b id="score">0</b></span>
    <span>WAVE <b id="wave">1</b></span>
    <span>LIVES <b id="lives">3</b></span>
  </div>
  <div id="stage">
    <canvas id="game" width="640" height="480"></canvas>
    <div id="overlay">
      <h1>SPACE INVADERS</h1>
      <p>Move with the LEFT / RIGHT buttons (or arrow keys).<br>
         Tap FIRE (or press Space) to shoot.<br>
         Stop the invaders before they reach you!</p>
      <button id="startBtn">START</button>
    </div>
  </div>
  <div id="controls">
    <div class="pad">
      <button class="key" id="leftBtn">&larr;</button>
      <button class="key" id="rightBtn">&rarr;</button>
    </div>
    <div class="pad">
      <button class="key" id="fireBtn">FIRE</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;

  const scoreEl = document.getElementById("score");
  const waveEl  = document.getElementById("wave");
  const livesEl = document.getElementById("lives");
  const overlay = document.getElementById("overlay");
  const overlayTitle = overlay.querySelector("h1");
  const overlayText  = overlay.querySelector("p");
  const startBtn = document.getElementById("startBtn");

  // ── Game state ────────────────────────────────────────────────
  const state = {
    running: false,
    score: 0,
    wave: 1,
    lives: 3,
    player: null,
    bullets: [],     // player bullets
    bombs: [],       // invader bombs
    invaders: [],
    dir: 1,          // 1 right, -1 left
    stepTimer: 0,
    stepInterval: 0.7, // seconds between invader steps (decreases)
    bombTimer: 0,
    particles: [],
    flash: 0,
  };

  const input = { left: false, right: false, fire: false, firePressed: false };

  // ── Player ────────────────────────────────────────────────────
  function makePlayer() {
    return { x: W/2 - 18, y: H - 40, w: 36, h: 16, speed: 260, cooldown: 0 };
  }

  // ── Invaders ──────────────────────────────────────────────────
  const COLS = 10, ROWS = 5;
  const INV_W = 28, INV_H = 20, GAP_X = 16, GAP_Y = 14;

  function spawnWave(n) {
    state.invaders = [];
    const totalW = COLS * INV_W + (COLS - 1) * GAP_X;
    const startX = (W - totalW) / 2;
    const startY = 50;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        state.invaders.push({
          x: startX + c * (INV_W + GAP_X),
          y: startY + r * (INV_H + GAP_Y),
          w: INV_W, h: INV_H,
          row: r,
          alive: true,
          frame: 0,
        });
      }
    }
    state.dir = 1;
    state.stepInterval = Math.max(0.12, 0.72 - (n - 1) * 0.08);
    state.stepTimer = state.stepInterval;
    state.bombTimer = 1.2;
  }

  function startGame() {
    state.running = true;
    state.score = 0;
    state.wave = 1;
    state.lives = 3;
    state.bullets = [];
    state.bombs = [];
    state.particles = [];
    state.player = makePlayer();
    spawnWave(1);
    updateHud();
    overlay.classList.add("hidden");
  }

  function nextWave() {
    state.wave += 1;
    state.bullets = [];
    state.bombs = [];
    spawnWave(state.wave);
    updateHud();
  }

  function gameOver(won) {
    state.running = false;
    overlay.classList.remove("hidden");
    overlayTitle.textContent = won ? "YOU WIN!" : "GAME OVER";
    overlayText.innerHTML =
      `Final score: <b>${state.score}</b> &middot; Wave <b>${state.wave}</b><br>Tap START to play again.`;
    startBtn.textContent = "PLAY AGAIN";
  }

  function updateHud() {
    scoreEl.textContent = state.score;
    waveEl.textContent = state.wave;
    livesEl.textContent = state.lives;
  }

  // ── Input ─────────────────────────────────────────────────────
  function bindHold(el, key) {
    const on  = e => { e.preventDefault(); input[key] = true;  el.classList.add("down");
      if (key === "fire") input.firePressed = true; };
    const off = e => { e.preventDefault(); input[key] = false; el.classList.remove("down"); };
    el.addEventListener("touchstart", on,  { passive: false });
    el.addEventListener("touchend",   off, { passive: false });
    el.addEventListener("touchcancel",off, { passive: false });
    el.addEventListener("mousedown",  on);
    el.addEventListener("mouseup",    off);
    el.addEventListener("mouseleave", off);
  }
  bindHold(document.getElementById("leftBtn"),  "left");
  bindHold(document.getElementById("rightBtn"), "right");
  bindHold(document.getElementById("fireBtn"),  "fire");

  window.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft")  input.left = true;
    if (e.key === "ArrowRight") input.right = true;
    if (e.key === " " || e.key === "Spacebar") { input.fire = true; input.firePressed = true; e.preventDefault(); }
    if (e.key === "Enter" && !state.running) startGame();
  });
  window.addEventListener("keyup", e => {
    if (e.key === "ArrowLeft")  input.left = false;
    if (e.key === "ArrowRight") input.right = false;
    if (e.key === " " || e.key === "Spacebar") input.fire = false;
  });

  startBtn.addEventListener("click", startGame);

  // ── Collisions ────────────────────────────────────────────────
  function hit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function explode(x, y, color) {
    for (let i = 0; i < 14; i++) {
      state.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 180,
        vy: (Math.random() - 0.5) * 180,
        life: 0.5 + Math.random() * 0.3,
        color,
      });
    }
  }

  // ── Update ────────────────────────────────────────────────────
  function update(dt) {
    if (!state.running) return;
    const p = state.player;

    // Move player
    if (input.left)  p.x -= p.speed * dt;
    if (input.right) p.x += p.speed * dt;
    p.x = Math.max(4, Math.min(W - p.w - 4, p.x));

    // Fire
    p.cooldown -= dt;
    if ((input.fire || input.firePressed) && p.cooldown <= 0) {
      state.bullets.push({ x: p.x + p.w/2 - 2, y: p.y - 8, w: 4, h: 10, vy: -520 });
      p.cooldown = 0.35;
    }
    input.firePressed = false;

    // Bullets
    for (const b of state.bullets) b.y += b.vy * dt;
    state.bullets = state.bullets.filter(b => b.y + b.h > 0);

    // Invader stepping
    const alive = state.invaders.filter(i => i.alive);
    if (alive.length === 0) { nextWave(); return; }

    // Difficulty: step faster the fewer remain
    const frac = alive.length / (COLS * ROWS);
    const curInterval = state.stepInterval * (0.25 + 0.75 * frac);
    state.stepTimer -= dt;
    if (state.stepTimer <= 0) {
      state.stepTimer = curInterval;
      let minX = Infinity, maxX = -Infinity;
      for (const inv of alive) { if (inv.x < minX) minX = inv.x; if (inv.x + inv.w > maxX) maxX = inv.x + inv.w; }
      const stepX = 10;
      let drop = false;
      if (state.dir > 0 && maxX + stepX > W - 6) drop = true;
      else if (state.dir < 0 && minX - stepX < 6) drop = true;
      if (drop) {
        state.dir *= -1;
        for (const inv of state.invaders) if (inv.alive) inv.y += 14;
      } else {
        for (const inv of state.invaders) if (inv.alive) inv.x += stepX * state.dir;
      }
      for (const inv of state.invaders) if (inv.alive) inv.frame = 1 - inv.frame;
    }

    // Invader bombs — random shooters
    state.bombTimer -= dt;
    if (state.bombTimer <= 0) {
      state.bombTimer = 0.55 + Math.random() * 0.9 - Math.min(0.4, state.wave * 0.05);
      // pick lowest invader in a random column
      const cols = {};
      for (const inv of alive) {
        const key = Math.round(inv.x);
        if (!cols[key] || cols[key].y < inv.y) cols[key] = inv;
      }
      const shooters = Object.values(cols);
      if (shooters.length) {
        const s = shooters[Math.floor(Math.random() * shooters.length)];
        state.bombs.push({ x: s.x + s.w/2 - 2, y: s.y + s.h, w: 4, h: 10, vy: 180 + state.wave * 12 });
      }
    }
    for (const b of state.bombs) b.y += b.vy * dt;
    state.bombs = state.bombs.filter(b => b.y < H);

    // Bullet hits invader
    for (const bullet of state.bullets) {
      for (const inv of state.invaders) {
        if (!inv.alive) continue;
        if (hit(bullet, inv)) {
          inv.alive = false;
          bullet.y = -1000;
          const pts = (ROWS - inv.row) * 10;
          state.score += pts;
          explode(inv.x + inv.w/2, inv.y + inv.h/2, "#0f0");
          updateHud();
          break;
        }
      }
    }
    state.bullets = state.bullets.filter(b => b.y > -20);

    // Bomb hits player
    for (const bomb of state.bombs) {
      if (hit(bomb, p)) {
        bomb.y = H + 1000;
        state.lives -= 1;
        state.flash = 0.35;
        explode(p.x + p.w/2, p.y + p.h/2, "#ff4040");
        updateHud();
        if (state.lives <= 0) { gameOver(false); return; }
      }
    }
    state.bombs = state.bombs.filter(b => b.y < H);

    // Invader reaches bottom
    for (const inv of alive) {
      if (inv.y + inv.h >= p.y) { gameOver(false); return; }
    }

    // Particles
    for (const part of state.particles) {
      part.x += part.vx * dt;
      part.y += part.vy * dt;
      part.life -= dt;
    }
    state.particles = state.particles.filter(p => p.life > 0);

    if (state.flash > 0) state.flash -= dt;
  }

  // ── Render ────────────────────────────────────────────────────
  function drawInvader(inv) {
    // Colour by row for variety
    const colors = ["#ff4ff0", "#ff8f00", "#ffff40", "#40ff40", "#40c0ff"];
    ctx.fillStyle = colors[inv.row % colors.length];
    const x = inv.x, y = inv.y, w = inv.w, h = inv.h;
    const u = w / 11, v = h / 8;
    // Simple 11×8 bitmap, two frames (legs toggle)
    const frameA = [
      "  X     X  ",
      "   X   X   ",
      "  XXXXXXX  ",
      " XX XXX XX ",
      "XXXXXXXXXXX",
      "X XXXXXXX X",
      "X X     X X",
      "   XX XX   ",
    ];
    const frameB = [
      "  X     X  ",
      "X  X   X  X",
      "X XXXXXXX X",
      "XXX XXX XXX",
      "XXXXXXXXXXX",
      " XXXXXXXXX ",
      "  X     X  ",
      " X       X ",
    ];
    const bmp = inv.frame ? frameB : frameA;
    for (let r = 0; r < bmp.length; r++) {
      for (let c = 0; c < bmp[r].length; c++) {
        if (bmp[r][c] === "X") ctx.fillRect(x + c * u, y + r * v, u + 0.5, v + 0.5);
      }
    }
  }

  function drawPlayer(p) {
    ctx.fillStyle = "#0f0";
    ctx.fillRect(p.x, p.y + 6, p.w, p.h - 6);
    ctx.fillRect(p.x + p.w/2 - 3, p.y, 6, 8);
    ctx.fillRect(p.x + 4, p.y + p.h - 4, p.w - 8, 4);
  }

  function render() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, W, H);

    // Starfield (static)
    ctx.fillStyle = "#123";
    for (let i = 0; i < 40; i++) {
      const sx = (i * 73) % W;
      const sy = (i * 131) % H;
      ctx.fillRect(sx, sy, 2, 2);
    }

    // Ground line
    ctx.strokeStyle = "#0f0";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H - 16); ctx.lineTo(W, H - 16); ctx.stroke();

    if (state.player) drawPlayer(state.player);

    // Bullets
    ctx.fillStyle = "#fff";
    for (const b of state.bullets) ctx.fillRect(b.x, b.y, b.w, b.h);

    // Bombs
    ctx.fillStyle = "#ff6060";
    for (const b of state.bombs) ctx.fillRect(b.x, b.y, b.w, b.h);

    // Invaders
    for (const inv of state.invaders) if (inv.alive) drawInvader(inv);

    // Particles
    for (const p of state.particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 0.8);
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;

    // Damage flash
    if (state.flash > 0) {
      ctx.fillStyle = `rgba(255,64,64,${Math.min(0.5, state.flash)})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ── Loop ──────────────────────────────────────────────────────
  let last = performance.now();
  function tick(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
